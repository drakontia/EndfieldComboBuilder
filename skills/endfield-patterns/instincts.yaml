# 状態異常ロジックの変更は 4 ファイルセットで行う

## Action

`lib/statusEffects.ts` または `lib/comboRequirements.ts` を変更するときは、以下を確認・同時更新する：

1. `lib/statusEffects.ts` — 状態異常処理
2. `lib/comboRequirements.ts` — スキル使用条件
3. `lib/statusEffectLabels.ts` — 表示ラベル
4. `lib/timeline.ts` — タイムライン計算との整合性
5. `tests/unit/lib/` — 対応テストの更新

## Evidence

- コミット「コンボ要件についてロジックを追加する」で上記 4 ファイルが同時変更
- `statusEffects.ts` は単独では変更されていない（常に隣接ファイルとセット）
- ドメインルールが 4 ファイルにまたがって実装されている
