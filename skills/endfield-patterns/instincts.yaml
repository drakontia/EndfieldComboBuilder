# types/combo.ts の変更後は stores/comboStore.ts を更新する

## Action

`types/combo.ts` に新しい型・Enum・インターフェースを追加した場合、`stores/comboStore.ts` の State/Action を同コミットまたは次コミットで更新する。

変更順序：
1. `types/combo.ts` — 型定義追加
2. `stores/comboStore.ts` — State に新フィールド追加
3. 対象コンポーネント / フック — UI 反映

## Evidence

- `types/combo.ts` は 50 コミット中 7 回変更（最頻変更ファイル Top 2）
- `Buff`, `Debuff` Enum 追加コミットは単独変更だったが、翌コミットで Store が更新されている
- `ComboAction` リネームコミットでは `stores/comboStore.ts` が同時変更

