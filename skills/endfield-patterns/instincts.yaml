# コミットメッセージは日本語・動詞結び形式

## Action

コミットメッセージは日本語で「〜を追加する」「〜を修正する」形式で記述する。

```
# 良い例
コンボ要件についてロジックを追加する
バフとデバフの型を分ける
スキル情報を追加する

# 古い英語スタイル（避ける）
Add combo requirements logic
Fix buff and debuff types
```

## Evidence

- 最新 30 コミットのほぼすべてが日本語動詞結び形式
- 初期コミット（英語）から徐々に日本語に移行
- リポジトリオーナーが日本語を主言語として使用

