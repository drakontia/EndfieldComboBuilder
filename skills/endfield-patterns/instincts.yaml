# テストファイルは tests/unit/{lib,hooks,components}/ に配置する

## Action

テスト対象に応じてディレクトリを使い分ける：

```
tests/unit/lib/          ← lib/*.ts のテスト
tests/unit/hooks/        ← hooks/use*.ts のテスト
tests/unit/components/   ← components/*.tsx のテスト
tests/e2e/               ← E2E フロー全体
```

単一テストの実行：
```bash
pnpm vitest run tests/unit/lib/timeline.test.ts
pnpm vitest run tests/unit/hooks/useComboActions.test.ts
pnpm playwright test tests/e2e/combo-builder.spec.ts
```

## Evidence

- 全 15 ユニットテストファイルがこの 3 ディレクトリに分類されている
- テスト追加コミットで `vitest.config.ts` と `vitest.setup.ts` も更新されている
- 旧配置（`__tests__/`）から `tests/unit/` に移行済み

