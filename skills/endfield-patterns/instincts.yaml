# 新オペレーター追加は 6 ファイルセットで行う

## Action

新オペレーターを追加するときは、以下の 6 ファイルを**同一コミット**で変更する：

1. `lib/data/operators.ts` — オペレーターデータ（キー: スネークケース）
2. `lib/data/skills.ts` — battle_skill / combo_skill / ultimate の 3 スキル
3. `lib/data/attacks.ts` — 通常攻撃データ
4. `messages/ja.json` — `character.{id}.name` キー
5. `messages/en.json` — `character.{id}.name` キー
6. `public/images/operators/{id}.png` — アイコン画像

```typescript
// operators.ts のキー命名規則
'chen_qianyu'  // スネークケース小文字
'da_pan'
'laevatain'

// skills.ts のキー命名規則
'laevatain_battle_skill'
'laevatain_combo_skill'
'laevatain_ultimate'
```

## Evidence

- git 履歴で `operators.ts` と `skills.ts` は常にセットで変更されている
- `messages/` ファイルはオペレーター追加コミットに必ず含まれる
- `public/images/operators/` に既存 23 オペレーターの画像が存在

