# i18n は ja.json と en.json を必ず同時に更新する

## Action

表示文言を追加・変更するときは、`messages/ja.json` と `messages/en.json` を**同一コミットで**更新する。どちらか一方のみの変更はしない。

```typescript
// ✅ 両ファイルに同じキーを追加
// messages/ja.json
{ "character.laevatain.name": "レーヴァテイン" }

// messages/en.json
{ "character.laevatain.name": "Laevatain" }
```

## Evidence

- 50 コミット中、`messages/ja.json` の変更は 6 回 — すべて `messages/en.json` と同時
- `lib/data/skills.ts` や `lib/data/attacks.ts` の変更も messages ファイルと同時に行われている
- next-intl の `useTranslations()` が両言語を要求する構造

