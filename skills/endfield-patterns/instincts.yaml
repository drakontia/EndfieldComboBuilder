# コンポーネントにビジネスロジックを書かず、カスタムフックに抽出する

## Action

コンポーネント内で直接 `useComboStore` を呼んだり、アクション操作ロジックを書かない。対応するカスタムフックを使う：

| 操作 | 使うフック |
|------|-----------|
| アクション追加/削除/移動 | `useComboActions` |
| キャラ選択/並び替え | `useComboCharacters` |
| 保存/読込/エクスポート | `useComboControlPanel` |
| 読込ダイアログ制御 | `useComboLoadDialog` |

新しいビジネスロジックが必要な場合は `hooks/use*.ts` に新しいカスタムフックを作成する。

## Evidence

- 専用コミット「hooks を個別に呼び出すようにする」でロジック分離が行われた
- 4 つのカスタムフックが `hooks/` に集約されており、コンポーネントは表示のみ
- コンポーネントテストはコールバック検証のみで、ロジックテストはフックテストに分離

